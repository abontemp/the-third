<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="40" height="40" rx="10" fill="url(#shine)"/>

  <!-- III — Roman numeral 3, three rounded bars -->
  <rect x="11" y="10" width="4.5" height="20" rx="2.25" fill="white" fill-opacity="0.75"/>
  <rect x="17.75" y="10" width="4.5" height="20" rx="2.25" fill="white"/>
  <rect x="24.5" y="10" width="4.5" height="20" rx="2.25" fill="white" fill-opacity="0.75"/>
</svg>
